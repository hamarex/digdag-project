services:
  postgres:
    image: postgres:16-alpine
    container_name: digdag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    command: postgres -c password_encryption=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digdag-network

  digdag-server:
    build:
      context: ./digdag-server
      dockerfile: Dockerfile
    container_name: digdag-server
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DIGDAG_SECRET_ENCRYPTION_KEY: ${DIGDAG_SECRET_ENCRYPTION_KEY}
    ports:
      - "${DIGDAG_PORT}:65432"
    volumes:
      - ./logs:/digdag/logs
      - ./workflows:/digdag/workflows
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - digdag-network

  devcontainer:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile
    container_name: digdag-devcontainer
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DIGDAG_USER_DB_PASSWORD: ${DIGDAG_USER_DB_PASSWORD}
    depends_on:
      - postgres
      - digdag-server
    networks:
      - digdag-network

volumes:
  postgres_data:
    driver: local

networks:
  digdag-network:
    driver: bridge
